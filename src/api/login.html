<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symbiont — 登录</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fafaf9;
    color: #292524;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 40px;
    width: 320px;
    text-align: center;
  }
  .login-logo { font-size: 48px; margin-bottom: 8px; }
  .login-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #44403c;
  }
  .login-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d6d3d1;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: #a8a29e; }
  .login-btn {
    width: 100%;
    margin-top: 16px;
    padding: 10px;
    background: #292524;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #44403c; }
  .login-error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">🌻</div>
  <div class="login-title">Symbiont</div>
  <form id="login-form">
    <input type="password" class="login-input" id="password" placeholder="输入密码" autofocus>
    <button type="submit" class="login-btn">登录</button>
    <div class="login-error" id="error">密码错误</div>
  </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault()
  var password = document.getElementById('password').value
  var errorEl = document.getElementById('error')
  errorEl.style.display = 'none'

  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: password })
    })
    if (res.ok) {
      // Also store in localStorage for SSE query param compatibility
      localStorage.setItem('symbiont_dashboard_token', password)
      window.location.href = '/'
    } else {
      errorEl.style.display = 'block'
    }
  } catch (err) {
    errorEl.textContent = '连接失败'
    errorEl.style.display = 'block'
  }
})
</script>
</body>
</html>
